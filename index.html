<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကျွန်တော့်ကို စာပို့ပါ</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --background: #f1f2f6;
            --text-dark: #2d3436;
            --text-light: #fff;
            --shadow: 0 10px 30px rgba(108, 92, 231, 0.15);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .form-card {
            background-color: var(--text-light);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transform: translateY(0);
            transition: var(--transition);
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(108, 92, 231, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        p.subtitle {
            font-size: 16px;
            color: #636e72;
            text-align: center;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            opacity: 0.8;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 15px 18px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
            transition: var(--transition);
            color: var(--text-dark);
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--text-light);
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.1);
        }

        textarea {
            height: 180px;
            resize: none;
            line-height: 1.6;
        }

        button {
            display: inline-block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-light);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
            filter: brightness(1.0);
        }

        .status-message {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none; /* Default hidden */
        }

        .status-message.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 30px;
            }
            h1 {
                font-size: 24px;
            }
            p.subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h1>စာပို့ရန်</h1>
        <p class="subtitle">သူငယ်ချင်းဆီကို စာတိုလေးတွေ လှမ်းပို့လိုက်ပါ (Gmail မလိုပါ)</p>
        
        <form action="https://formspree.io/f/xjgqyneo" method="POST">
            <div class="input-group">
                <label for="name">သင့်နာမည် (မထည့်လည်းရပါတယ်)</label>
                <input type="text" id="name" name="sender_name" placeholder="ဥပမာ: ကျော်ကျော်">
            </div>

            <div class="input-group">
                <label for="message">သင့်ရဲ့ စာစောင်</label>
                <textarea id="message" name="message" placeholder="ဒီနေရာမှာ စာရိုက်ပါ..." required></textarea>
            </div>

            <button type="submit">ပေးပို့မည်</button>
        </form>

        <div class="status-message" id="statusMessage"></div>
    </div>

</body>
</html>
